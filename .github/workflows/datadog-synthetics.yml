# Datadog Synthetic tests — runs on PRs targeting main.
# The job is non-blocking (continue-on-error: true) so missing
# DD_API_KEY / DD_APP_KEY secrets don't fail the PR check.
name: Run Datadog Synthetic tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
    - uses: actions/checkout@v4

    - name: Skip if secrets not configured
      id: check
      run: |
        if [ -z "$DD_API_KEY" ] || [ -z "$DD_APP_KEY" ]; then
          echo "Datadog secrets not configured — skipping synthetic tests."
          echo "skip=true" >> "$GITHUB_OUTPUT"
        fi
      env:
        DD_API_KEY: ${{ secrets.DD_API_KEY }}
        DD_APP_KEY: ${{ secrets.DD_APP_KEY }}

    - name: Run Datadog Synthetic tests
      if: steps.check.outputs.skip != 'true'
      uses: DataDog/synthetics-ci-github-action@87b505388a22005bb8013481e3f73a367b9a53eb # v1.4.0
      with:
        api_key: ${{secrets.DD_API_KEY}}
        app_key: ${{secrets.DD_APP_KEY}}
        test_search_query: 'tag:e2e-tests'
